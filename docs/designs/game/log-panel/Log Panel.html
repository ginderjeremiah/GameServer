<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Combat Log · Directions</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #ededed; font-family: Geist, Arial, Helvetica, sans-serif; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="log-shared.jsx"></script>
<script type="text/babel" src="log-manifest.jsx"></script>
<script type="text/babel" src="log-feed.jsx"></script>
<script type="text/babel" src="log-cards.jsx"></script>
<script type="text/babel" src="log-spotlight.jsx"></script>

<script type="text/babel">
function App() {
  return (
    <DesignCanvas
      title="Combat Log · Directions"
      subtitle="Four approaches to the bottom log panel. Each auto-feeds new entries every ~1.1s so you can watch the motion. Color key: blue = player action, red = enemy action, green = loot, gold = crit, gray = system.">

      <DCSection id="modern" title="Modernized" subtitle="Same data stream, four different presentations">
        <DCArtboard id="manifest" label="A · Sliding Manifest — newest on top" width={1060} height={280}>
          <LogStage>
            <LogManifest />
          </LogStage>
        </DCArtboard>
        <DCArtboard id="feed" label="B · Streaming Feed" width={1060} height={280}>
          <LogStage>
            <LogFeed />
          </LogStage>
        </DCArtboard>
        <DCArtboard id="cards" label="C · Event Cards" width={1060} height={300}>
          <LogStage>
            <LogCards />
          </LogStage>
        </DCArtboard>
        <DCArtboard id="spotlight" label="D · Latest + History" width={1060} height={300}>
          <LogStage>
            <LogSpotlight />
          </LogStage>
        </DCArtboard>
      </DCSection>

      <DCSection id="current" title="Current" subtitle="Existing log panel">
        <DCArtboard id="now" label="Now · Svelte source" width={1060} height={280}>
          <CurrentLog />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

function CurrentLog() {
  const entries = useLogStream({ maxEntries: 30 });
  const containerRef = React.useRef(null);
  React.useEffect(() => {
    if (containerRef.current) {
      containerRef.current.scrollTop = containerRef.current.scrollHeight;
    }
  }, [entries.length]);
  return (
    <div style={{
      width: '100%', height: '100%',
      background: 'linear-gradient(0deg, #000 0%, #2c2c2c 100%)',
      padding: 20, boxSizing: 'border-box',
      display: 'flex', alignItems: 'flex-end',
    }}>
      <div ref={containerRef} style={{
        width: '100%', height: 220,
        background: '#f0f0f0', color: '#111',
        border: '1px solid #000', borderRadius: 5,
        boxShadow: '0 0 0.25rem #000',
        padding: 4, overflow: 'auto',
        fontSize: 12,
      }}>
        {entries.map((e) => (
          <div key={e.id} style={{ padding: 2, borderBottom: '1px solid #000' }}>{plainText(e)}</div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
