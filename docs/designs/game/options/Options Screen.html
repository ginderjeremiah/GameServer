<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Options Screen · Settings</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000;
    font-family: Geist, Arial, Helvetica, sans-serif; }
  * { box-sizing: border-box; }
  #root { height: 100%; }
  ::selection { background: rgba(161,194,247,0.3); }
  @keyframes op-pulse {
    0%, 100% { opacity: 0.6; } 50% { opacity: 1; }
  }
  @keyframes op-rowin {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  /* slim scrollbars to match the dark UI */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="options-screen.jsx"></script>
<script type="text/babel" src="options-parts.jsx"></script>

<script type="text/babel">
const { LOG_TYPES, EXTRA_LOG_TYPES, LOG_GROUPS, SETTINGS_CATS } = window.OptionsConfig;
const { LivePreview, SettingsRail, GameRail, SaveBar } = window.OptionsParts;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "control": "toggle",
  "logSet": "current",
  "showPreview": true,
  "showFuture": true,
  "accent": "#a1c2f7"
}/*EDITMODE-END*/;

function initialPrefs() {
  const p = {};
  [...LOG_TYPES, ...EXTRA_LOG_TYPES].forEach((lt) => { p[lt.key] = lt.def; });
  return p;
}

function OptionsScreen() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const accent = t.accent;

  const [cat, setCat] = React.useState('logging');
  const [saved, setSaved] = React.useState(initialPrefs);   // persisted state
  const [draft, setDraft] = React.useState(initialPrefs);   // working copy
  const [flash, setFlash] = React.useState(false);

  // active log-type list — the "expanded" Tweak previews how it scales
  const activeTypes = t.logSet === 'expanded' ? [...LOG_TYPES, ...EXTRA_LOG_TYPES] : LOG_TYPES;
  const dirtyKeys = activeTypes.filter((lt) => draft[lt.key] !== saved[lt.key]).map((lt) => lt.key);
  const dirtyCount = dirtyKeys.length;

  const setOne = (key, val) => { setDraft((d) => ({ ...d, [key]: val })); setFlash(false); };
  const setMany = (keys, val) => { setDraft((d) => { const n = { ...d }; keys.forEach((k) => n[k] = val); return n; }); setFlash(false); };

  const save = () => {
    // mirrors LogManager.saveSettingChanges — only persists the actual diff
    setSaved({ ...draft });
    setFlash(true);
    setTimeout(() => setFlash(false), 1900);
  };
  const discard = () => { setDraft({ ...saved }); setFlash(false); };

  return (
    <div style={{
      width: '100%', height: '100%',
      background: 'linear-gradient(0deg, #000 0%, #2c2c2c 100%)',
      color: '#f0f0f0', display: 'flex', overflow: 'hidden',
    }}>
      <GameRail accent={accent} />

      {/* settings surface */}
      <div style={{ flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column' }}>
        {/* top bar */}
        <div style={{
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          padding: '20px 28px 18px', borderBottom: '1px solid rgba(255,255,255,0.07)',
          flexShrink: 0,
        }}>
          <div>
            <div style={{
              fontFamily: 'Geist Mono, monospace', fontSize: 10, letterSpacing: 2,
              textTransform: 'uppercase', color: `${accent}b3`, marginBottom: 6,
            }}>Settings</div>
            <h1 style={{ margin: 0, fontSize: 25, fontWeight: 500, letterSpacing: -0.3 }}>Options</h1>
          </div>
          <TickReadout accent={accent} />
        </div>

        {/* body: settings rail + content */}
        <div style={{ flex: 1, minHeight: 0, display: 'flex' }}>
          <SettingsRail active={cat} onPick={setCat} accent={accent} showFuture={t.showFuture} />

          {/* content column */}
          <div style={{ flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column', minHeight: 0 }}>
            <div style={{ flex: 1, minHeight: 0, overflowY: 'auto', padding: '24px 28px' }}>
              <LoggingPanel
                activeTypes={activeTypes} draft={draft} dirtyKeys={dirtyKeys}
                control={t.control} accent={accent} showPreview={t.showPreview}
                onToggle={setOne} onToggleMany={setMany} />
            </div>
            <SaveBar dirtyCount={dirtyCount} saved={flash} accent={accent} onSave={save} onDiscard={discard} />
          </div>
        </div>
      </div>

      <TweaksPanel>
        <TweakSection label="Control" />
        <TweakRadio label="Setting control" value={t.control}
          options={['toggle', 'select']} onChange={(v) => setTweak('control', v)} />
        <TweakRadio label="Log set" value={t.logSet}
          options={['current', 'expanded']} onChange={(v) => setTweak('logSet', v)} />
        <TweakSection label="Layout" />
        <TweakToggle label="Live preview" value={t.showPreview}
          onChange={(v) => setTweak('showPreview', v)} />
        <TweakToggle label="Future categories" value={t.showFuture}
          onChange={(v) => setTweak('showFuture', v)} />
        <TweakSection label="Theme" />
        <TweakColor label="Accent" value={t.accent}
          options={['#a1c2f7', '#bde0b4', '#f0d28a', '#e8b6a6']}
          onChange={(v) => setTweak('accent', v)} />
      </TweaksPanel>
    </div>
  );
}

/* ── the Logging category content ────────────────────────────────────── */
function LoggingPanel({ activeTypes, draft, dirtyKeys, control, accent, showPreview, onToggle, onToggleMany }) {
  const enabledCount = activeTypes.filter((lt) => draft[lt.key]).length;
  // only render groups that actually contain active types
  const groups = LOG_GROUPS
    .map((g) => ({ ...g, types: activeTypes.filter((lt) => lt.group === g.key) }))
    .filter((g) => g.types.length);

  return (
    <div style={{ maxWidth: 1100, margin: '0 auto', display: 'flex', flexDirection: 'column', gap: 22 }}>
      {/* header */}
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: 20 }}>
        <div>
          <div style={{
            fontFamily: 'Geist Mono, monospace', fontSize: 9.5, letterSpacing: 1.8,
            textTransform: 'uppercase', color: 'rgba(192,216,255,0.7)', marginBottom: 7,
          }}>Logging · Combat Log</div>
          <h2 style={{ margin: 0, fontSize: 19, fontWeight: 500, letterSpacing: -0.2 }}>Message Types</h2>
          <p style={{ margin: '8px 0 0', fontSize: 13.5, color: 'rgba(240,240,240,0.5)', maxWidth: 560, lineHeight: 1.5 }}>
            Choose which kinds of events show up in your combat log. Disabled types are
            hidden from the feed but still recorded by the engine.
          </p>
        </div>
        <div style={{
          fontFamily: 'Geist Mono, monospace', fontSize: 11, letterSpacing: 0.5,
          color: 'rgba(240,240,240,0.5)', whiteSpace: 'nowrap', paddingBottom: 2,
        }}>
          <span style={{ color: accent }}>{enabledCount}</span> / {activeTypes.length} shown
        </div>
      </div>

      <div style={{ display: 'flex', gap: 24, alignItems: 'flex-start', flexWrap: 'wrap' }}>
        {/* the grouped list */}
        <div style={{ flex: '1 1 480px', minWidth: 360, display: 'flex', flexDirection: 'column', gap: 14 }}>
          {groups.map((g) => (
            <GroupSection key={g.key} group={g} draft={draft} dirtyKeys={dirtyKeys}
              control={control} accent={accent} onToggle={onToggle} onToggleMany={onToggleMany} />
          ))}

          {/* always-on note — applies across every group */}
          <div style={{
            display: 'flex', alignItems: 'center', gap: 11, padding: '12px 16px',
            border: '1px solid rgba(232,182,166,0.18)', borderRadius: 4,
            background: 'rgba(232,182,166,0.04)',
          }}>
            <div style={{ width: 30, height: 30, flexShrink: 0, borderRadius: 3,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              background: 'rgba(232,182,166,0.1)', border: '1px solid rgba(232,182,166,0.3)' }}>
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#e8b6a6" strokeWidth="1.4" strokeLinecap="round">
                <path d="M7 1.5L12.5 11.5h-11z" strokeLinejoin="round" /><path d="M7 6v2.5M7 10v0.01" />
              </svg>
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 13.5, color: 'rgba(240,240,240,0.78)' }}>Errors</div>
              <div style={{ fontSize: 12.5, color: 'rgba(240,240,240,0.45)' }}>Always shown — critical messages can't be hidden.</div>
            </div>
            <span style={{
              fontFamily: 'Geist Mono, monospace', fontSize: 10.5, letterSpacing: 0.5,
              textTransform: 'uppercase', color: 'rgba(232,182,166,0.85)',
            }}>Always on</span>
          </div>
        </div>

        {/* live preview — sticks in place while a long list scrolls */}
        {showPreview && (
          <div style={{ flex: '1 1 330px', minWidth: 300, display: 'flex',
            height: 440, position: 'sticky', top: 0, alignSelf: 'flex-start' }}>
            <LivePreview prefs={draft} accent={accent} />
          </div>
        )}
      </div>
    </div>
  );
}

/* ── one collapsible group of log types ──────────────────────────────── */
function GroupSection({ group, draft, dirtyKeys, control, accent, onToggle, onToggleMany }) {
  const [open, setOpen] = React.useState(true);
  const [hoverHead, setHoverHead] = React.useState(false);
  const keys = group.types.map((t) => t.key);
  const onCount = group.types.filter((t) => draft[t.key]).length;
  const allOn = onCount === keys.length;
  const allOff = onCount === 0;
  const groupDirty = group.types.some((t) => dirtyKeys.includes(t.key));

  return (
    <div style={{
      border: '1px solid rgba(255,255,255,0.08)', borderRadius: 4,
      background: 'rgba(255,255,255,0.015)', overflow: 'hidden',
    }}>
      {/* group header */}
      <div
        onMouseEnter={() => setHoverHead(true)}
        onMouseLeave={() => setHoverHead(false)}
        style={{
          display: 'flex', alignItems: 'center', gap: 12,
          padding: '11px 16px',
          background: hoverHead ? 'rgba(255,255,255,0.02)' : 'rgba(255,255,255,0.015)',
          borderBottom: open ? '1px solid rgba(255,255,255,0.07)' : 'none',
          transition: 'background 130ms',
        }}>
        <button
          onClick={() => setOpen((o) => !o)}
          style={{
            display: 'flex', alignItems: 'center', gap: 10, flex: 1,
            background: 'transparent', border: 'none', cursor: 'pointer',
            padding: 0, textAlign: 'left', color: 'inherit',
          }}>
          <svg width="11" height="11" viewBox="0 0 12 12" fill="none"
            stroke="rgba(240,240,240,0.55)" strokeWidth="1.5"
            style={{ transform: open ? 'rotate(90deg)' : 'rotate(0deg)', transition: 'transform 160ms' }}>
            <path d="M4 2.5L8 6L4 9.5" strokeLinecap="round" strokeLinejoin="round" />
          </svg>
          <span style={{
            fontFamily: 'Geist Mono, monospace', fontSize: 10.5, letterSpacing: 1.6,
            textTransform: 'uppercase', color: 'rgba(240,240,240,0.78)',
          }}>{group.label}</span>
          {groupDirty && (
            <span style={{ width: 5, height: 5, borderRadius: '50%', background: '#f0d28a',
              boxShadow: '0 0 6px rgba(240,210,138,0.85)' }} />
          )}
          <span style={{
            fontFamily: 'Geist Mono, monospace', fontSize: 10, letterSpacing: 0.5,
            color: 'rgba(240,240,240,0.4)',
          }}>{onCount}/{keys.length}</span>
        </button>
        <GroupToggle on={allOn} mixed={!allOn && !allOff} accent={accent}
          onClick={() => onToggleMany(keys, !allOn)} />
      </div>

      {/* rows */}
      {open && group.types.map((lt) => (
        <LogRow key={lt.key} type={lt} on={draft[lt.key]}
          dirty={dirtyKeys.includes(lt.key)} control={control} accent={accent}
          onToggle={(v) => onToggle(lt.key, v)} />
      ))}
    </div>
  );
}

function TickReadout({ accent }) {
  const [tick, setTick] = React.useState({ l: 60, r: 60 });
  React.useEffect(() => {
    const id = setInterval(() => setTick({
      l: 58 + Math.round(Math.random() * 4), r: 58 + Math.round(Math.random() * 4),
    }), 700);
    return () => clearInterval(id);
  }, []);
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10,
      fontFamily: 'Geist Mono, monospace', fontSize: 10.5,
      color: 'rgba(240,240,240,0.5)', letterSpacing: 0.5 }}>
      <span style={{ width: 5, height: 5, borderRadius: '50%', background: accent,
        boxShadow: `0 0 7px ${accent}`, animation: 'op-pulse 1.6s ease-in-out infinite' }} />
      <span>L · {tick.l}</span><span style={{ opacity: 0.4 }}>·</span><span>R · {tick.r}</span>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<OptionsScreen />);
</script>
</body>
</html>
