<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Attribute Page · Directions</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0b0c0f;
    font-family: Geist, Arial, Helvetica, sans-serif; }
  * { box-sizing: border-box; }
  #root { height: 100%; }
  ::selection { background: rgba(161,194,247,0.3); }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="attr-shared.jsx"></script>
<script type="text/babel" src="attr-hexforge.jsx"></script>
<script type="text/babel" src="attr-sliderbench.jsx"></script>
<script type="text/babel" src="attr-statcards.jsx"></script>
<script type="text/babel" src="attr-console.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "detail": false,
  "accent": "#a1c2f7"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const p = { accent: t.accent, detail: t.detail };

  return (
    <React.Fragment>
      <DesignCanvas
        title="Attribute Page · Four Directions"
        subtitle="Point-buy on the 6 core attributes (derived stats are secondary). Each board is live — spend points, try a preset, hit Confirm. Toggle 'Theorycrafter details' in Tweaks to surface exact formulas. These sit inside the game frame; nav chrome omitted to keep the focus on the idea.">
        <DCSection id="attr-directions" title="Directions" subtitle="Very different takes — we'll mix and match from here.">
          <DCArtboard id="hexforge" label="A · Hexagon Forge — build as a shape" width={1180} height={820}>
            <HexForge {...p} />
          </DCArtboard>
          <DCArtboard id="sliderbench" label="B · Slider Bench — drag to allocate" width={1180} height={700}>
            <SliderBench {...p} />
          </DCArtboard>
          <DCArtboard id="statcards" label="C · Stat Cards — guided & explained" width={1180} height={790}>
            <StatCards {...p} />
          </DCArtboard>
          <DCArtboard id="console" label="D · Console Readout — everything at once" width={1180} height={700}>
            <ConsoleReadout {...p} />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel>
        <TweakSection label="Detail" />
        <TweakToggle label="Theorycrafter details" value={t.detail}
          onChange={(v) => setTweak('detail', v)} />
        <TweakSection label="Theme" />
        <TweakColor label="UI accent" value={t.accent}
          options={['#a1c2f7', '#bde0b4', '#f0d28a', '#c4b6ec']}
          onChange={(v) => setTweak('accent', v)} />
      </TweaksPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
