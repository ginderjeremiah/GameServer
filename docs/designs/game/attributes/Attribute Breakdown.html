<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Stats · Attribute Breakdown · Directions</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0b0c0f;
    font-family: Geist, Arial, Helvetica, sans-serif; }
  * { box-sizing: border-box; }
  #root { height: 100%; }
  ::selection { background: rgba(161,194,247,0.3); }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="sb-attr-data.jsx"></script>
<script type="text/babel" src="sb-attr-shared.jsx"></script>
<script type="text/babel" src="sb-attr-stack.jsx"></script>
<script type="text/babel" src="sb-attr-ledger.jsx"></script>
<script type="text/babel" src="sb-attr-grouped.jsx"></script>
<script type="text/babel" src="sb-attr-inspector.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "showInactive": true,
  "density": "comfortable",
  "accent": "#a1c2f7"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const p = { accent: t.accent, showInactive: t.showInactive };

  return (
    <React.Fragment>
      <DesignCanvas
        title="Stats · Attribute Breakdown — Four Directions"
        subtitle="A read-only view of where every total attribute comes from: base values, allocated stat points, equipment, item mods, and derivations. Additive modifiers sum first, then multiplicative modifiers apply — exactly as the engine's AttributeCollection resolves them, so every breakdown sums to the total. Numbers reflect a level-12 character in the Inventory screen's equipped loadout. Nav chrome omitted to keep focus on the idea. Toggle inactive/obsolete attributes and density in Tweaks.">
        <DCSection id="attr-breakdown" title="Directions" subtitle="Different takes on showing composition — we'll mix and match.">
          <DCArtboard id="stack" label="A · Stacked Bars — whole sheet at a glance" width={1120} height={840}>
            <AttrStack {...p} density={t.density} />
          </DCArtboard>
          <DCArtboard id="grouped" label="B · Grouped + Expand — calm, drills down" width={1180} height={860}>
            <AttrGrouped {...p} />
          </DCArtboard>
          <DCArtboard id="inspector" label="C · Inspector — trace one attribute" width={1180} height={720}>
            <AttrInspector {...p} />
          </DCArtboard>
          <DCArtboard id="ledger" label="D · Ledger — every modifier, in order" width={1180} height={900}>
            <AttrLedger {...p} showRunning={t.density !== 'compact'} />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel>
        <TweakSection label="Contents" />
        <TweakToggle label="Show inactive / obsolete" value={t.showInactive}
          onChange={(v) => setTweak('showInactive', v)} />
        <TweakSection label="Density" />
        <TweakRadio label="Spacing" value={t.density}
          options={['compact', 'comfortable']}
          onChange={(v) => setTweak('density', v)} />
        <TweakSection label="Theme" />
        <TweakColor label="UI accent" value={t.accent}
          options={['#a1c2f7', '#bde0b4', '#f0d28a', '#c4b6ec']}
          onChange={(v) => setTweak('accent', v)} />
      </TweaksPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
