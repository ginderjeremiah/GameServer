<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Login Screen · Directions</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #ededed; font-family: Geist, Arial, Helvetica, sans-serif; }
  * { box-sizing: border-box; }
  input::placeholder { color: rgba(240,240,240,0.55); }
  .v-card input::placeholder { color: rgba(0,0,0,0.35); }
  a { -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="login-shared.jsx"></script>
<script type="text/babel" src="variant-card.jsx"></script>
<script type="text/babel" src="variant-panel.jsx"></script>
<script type="text/babel" src="variant-stack.jsx"></script>

<script type="text/babel">
function App() {
  return (
    <DesignCanvas title="Login · Modernization" subtitle="Three directions — all with live field validation. Try short usernames, mismatched passwords, or sign in with password 'wrong' / sign up as 'admin' to trigger server errors.">
      <DCSection id="current" title="Current" subtitle="Existing screen for reference">
        <DCArtboard id="now" label="Now · Svelte source" width={460} height={620}>
          <CurrentSvelteScreen />
        </DCArtboard>
      </DCSection>

      <DCSection id="modernized" title="Modernized" subtitle="Pick one — or mix elements. All three are fully interactive.">
        <DCArtboard id="card" label="A · Refined Card" width={460} height={620}>
          <div className="v-card" style={{ width: '100%', height: '100%' }}>
            <VariantCard />
          </div>
        </DCArtboard>

        <DCArtboard id="panel" label="B · Game Panel" width={880} height={620}>
          <VariantPanel />
        </DCArtboard>

        <DCArtboard id="stack" label="C · Minimal Stack" width={480} height={640}>
          <VariantStack />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

/* faithful render of the current Svelte screen for side-by-side comparison */
function CurrentSvelteScreen() {
  const [u, setU] = React.useState('');
  const [p, setP] = React.useState('');
  const [err, setErr] = React.useState(null);
  const [loading, setLoading] = React.useState(false);

  const go = async (kind) => {
    if (!u || !p) return; // mirrors source — silent return
    setLoading(true);
    await new Promise((r) => setTimeout(r, 600));
    setLoading(false);
    setErr(kind === 'login' ? 'Incorrect username or password.' : 'Username already taken.');
  };

  return (
    <div style={{
      width: '100%', height: '100%',
      background: 'linear-gradient(0deg, #000 0%, #3c3c3c 100%)',
      fontFamily: 'Arial, Helvetica, sans-serif',
      padding: '24px',
      boxSizing: 'border-box',
    }}>
      <h1 style={{
        textAlign: 'center', color: '#f0f0f0',
        textShadow: '0 0 0.25rem #000',
        fontSize: 32, fontWeight: 700, margin: '12px 0 24px',
      }}>Login</h1>
      <div style={{ display: 'flex', justifyContent: 'center' }}>
        <div style={{
          background: '#f0f0f0', border: '1px solid #000',
          borderRadius: 5, boxShadow: '0 0 0.25rem #000',
          padding: '2rem', width: '10rem',
        }}>
          <div style={{ marginBottom: '1rem' }}>
            <label style={{ display: 'block', fontSize: '0.8rem', paddingBottom: 4 }}>Username</label>
            <input type="text" value={u} onChange={(e) => setU(e.target.value)}
              style={{ width: '100%', boxSizing: 'border-box', height: '1.5rem', padding: '0.375rem 0.25rem', border: '1px solid #000', borderRadius: 5, outline: 'none', background: 'white', fontSize: 16 }} />
          </div>
          <div style={{ marginBottom: '1rem' }}>
            <label style={{ display: 'block', fontSize: '0.8rem', paddingBottom: 4 }}>Password</label>
            <input type="password" value={p} onChange={(e) => setP(e.target.value)}
              style={{ width: '100%', boxSizing: 'border-box', height: '1.5rem', padding: '0.375rem 0.25rem', border: '1px solid #000', borderRadius: 5, outline: 'none', background: 'white', fontSize: 16 }} />
          </div>
          {err && (
            <div style={{ marginBottom: '1rem', fontSize: 14, color: 'red' }}>
              <div>An error occurred while attempting to login.</div>
              <div>{err}</div>
            </div>
          )}
          <div style={{ marginBottom: '1rem' }}>
            <button onClick={() => go('login')} disabled={loading}
              style={{ width: '100%', padding: '0.2em 0.5em', background: '#a1c2f7', border: '1px solid #000', borderRadius: 5, cursor: loading ? 'not-allowed' : 'pointer', fontSize: 16 }}>Login</button>
          </div>
          <div>
            <button onClick={() => go('signup')} disabled={loading}
              style={{ width: '100%', padding: '0.2em 0.5em', background: '#a1c2f7', border: '1px solid #000', borderRadius: 5, cursor: loading ? 'not-allowed' : 'pointer', fontSize: 16 }}>Create Account</button>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
