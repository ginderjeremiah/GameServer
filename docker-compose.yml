# Backing stack for end-to-end (Playwright) runs: the Game.Api service plus its PostgreSQL and
# Redis dependencies. The SvelteKit frontend is intentionally NOT included here — Playwright starts
# the dev server itself (see UI/playwright.config.ts) and Vite proxies /api and /socket
# to the API on localhost:5008.
#
# Networking: every service uses `network_mode: host`. This is deliberate. The constrained sandbox
# used for remote Claude sessions runs a dockerd with `--iptables=false` and no usable bridge (see
# docs/backend.md "Integration-Test Containers in Constrained Environments" and
# .claude/hooks/session-start.sh), so bridge networking and published ports do not work there. Host
# networking keeps everything on localhost, which works in that sandbox and on GitHub Actions Linux
# runners alike. Note: host networking requires a Linux Docker host — on Docker Desktop (Windows/Mac)
# run the API natively instead (this stack targets CI and the sandbox).
#
# Ports default to dedicated values to avoid colliding with the integration-test backing services
# (5499 / 6399) and any native PostgreSQL/Redis. Override via the environment if needed.
#
# Seeding: the API migrates on startup (intrinsic enum-backed reference data only) and then seeds the
# static content (Skills/Enemies/Zones/…) from the source-controlled export (content/*.json) before it
# loads its reference-data caches — driven by DataAccessOptions__SeedContentOnStartup below, so the
# stack comes up fully playable with no post-boot seed or API restart. The e2e admin-role fixture
# (granting the Admin role to 'e2eadmin…' accounts) is not content, so it is applied separately by the
# CI workflow from e2e-admin-provision.sql. See docs/backend.md "Content export (source-controlled snapshot)".

services:
  postgres:
    image: postgres:18-alpine
    network_mode: host
    command: ["-p", "${POSTGRES_PORT:-5544}"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-game}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-game}
      POSTGRES_DB: ${POSTGRES_DB:-game}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-game} -d ${POSTGRES_DB:-game} -p ${POSTGRES_PORT:-5544}"]
      interval: 3s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    network_mode: host
    command: ["--port", "${REDIS_PORT:-6544}"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p ${REDIS_PORT:-6544} ping | grep -q PONG"]
      interval: 3s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Game.Api/Dockerfile
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # Bind the port the Vite dev-server proxy targets (UI/vite.config.ts).
      ASPNETCORE_HTTP_PORTS: ${API_PORT:-5008}
      # Allowed CORS origin for the Playwright dev server (UI/playwright.config.ts serves the UI on
      # 4173). Outside Development the API has no built-in default and validates this at startup, so
      # the dockerized e2e stack must supply it or the API aborts on boot.
      Cors__AllowedOrigins__0: "http://localhost:4173"
      # Effectively disable the auth rate limiter for e2e: the whole Playwright suite logs in through
      # the Vite proxy from one source IP (localhost), so every auth request shares a single partition
      # and the production-default 10/min limit would 429 the parallel login-heavy tests. Mirrors the
      # high limit the integration-test factory sets for the same reason.
      RateLimiting__Auth__PermitLimit: "100000"
      # Secrets required at startup. These are throwaway values for CI / e2e only.
      HashPepper: docker-compose-e2e-pepper
      Jwt__SigningKey: docker-compose-e2e-signing-key-at-least-32-bytes-long
      Jwt__Issuer: game-server-api
      Jwt__Audience: game-server-api
      # 1 = Postgres, 0 = Redis (see Game.Abstractions/Infrastructure/Enums.cs).
      DataAccessOptions__DatabaseSystem: "1"
      DataAccessOptions__CacheSystem: "0"
      DataAccessOptions__PubSubSystem: "0"
      # Apply EF migrations (which carry the intrinsic reference data) on startup outside Development, then
      # seed the static content from the source-controlled export so the stack is playable on first boot.
      DataAccessOptions__MigrateOnStartup: "true"
      DataAccessOptions__SeedContentOnStartup: "true"
      DataAccessOptions__DbConnectionString: "Host=localhost;Port=${POSTGRES_PORT:-5544};Database=${POSTGRES_DB:-game};Username=${POSTGRES_USER:-game};Password=${POSTGRES_PASSWORD:-game}"
      DataAccessOptions__CacheConnectionString: "localhost:${REDIS_PORT:-6544}"
      DataAccessOptions__PubSubConnectionString: "localhost:${REDIS_PORT:-6544}"
