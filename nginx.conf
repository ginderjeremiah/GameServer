
# Add this line pointing to Railway's internal DNS
resolver [fd12::10] ipv6=on valid=10s;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
		# Railway automatically maps the public domain to this $PORT variable
		listen ${PORT};
		server_name _;

		# 1. Route all API traffic to the .NET service
		location /api/ {
				# Use variables for hostnames to prevent Nginx from crashing if a service is restarting
				set $dotnet_backend "http://gameserver.railway.internal:8080";
				
				proxy_pass $dotnet_backend;
				proxy_http_version 1.1;
				proxy_set_header Host $host;
				proxy_set_header X-Real-IP $remote_addr;
				proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
				proxy_set_header X-Forwarded-Proto $scheme;
		}

		# 2. Dedicated WebSocket rerouting path
    location /socket {
        proxy_pass "http://gameserver.railway.internal:8080";
        
        proxy_http_version 1.1;
				proxy_set_header Host $host;
				proxy_set_header X-Real-IP $remote_addr;
				proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
				proxy_set_header X-Forwarded-Proto $scheme;
        
        # Inject the hop-by-hop headers needed for connection upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Prevent NGINX from dropping inactive sockets early (Default is 60s)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

		# 3. Route all other traffic to the Node.js SSR app
		location / {
				set $node_backend "http://gameserver-ui.railway.internal:8080";

				proxy_pass $node_backend;
				proxy_http_version 1.1;
				
				# WebSocket support for SSR frameworks (HMR, hydration, etc.)
				proxy_set_header Upgrade $http_upgrade;
				proxy_set_header Connection "upgrade";
				
				proxy_set_header Host $host;
				proxy_set_header X-Real-IP $remote_addr;
				proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
				proxy_set_header X-Forwarded-Proto $scheme;
		}
}