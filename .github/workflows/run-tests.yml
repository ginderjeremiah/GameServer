# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow will test a .NET application

name: Run tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# No job needs more than read access to repo contents (checkout); this also caps the third-party
# dorny/paths-filter@v4 action (flagged above as uncertified) to the same least-privilege default.
permissions:
  contents: read

# Cancel any in-progress run for the same ref (PR branch or main) when a newer push lands. The
# heaviest path is the 3-browser test-e2e matrix, so superseding stale runs frees those minutes
# for the run that actually matters.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  detect-changes:
    # Only needed for PRs — on push to main we always run all tests.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Detect changed paths
      uses: dorny/paths-filter@v4
      id: filter
      with:
        filters: |
          backend:
            - 'Game.Abstractions/**'
            - 'Game.Api/**'
            - 'Game.Api.Tests/**'
            - 'Game.Application/**'
            - 'Game.Application.Tests/**'
            - 'Game.Core/**'
            - 'Game.Core.TestInfrastructure/**'
            - 'Game.Core.Tests/**'
            - 'Game.DataAccess/**'
            - 'Game.Infrastructure/**'
            - 'Game.Infrastructure.Tests/**'
            - 'Game.TestInfrastructure/**'
            - 'Game.sln'
            - 'build/**'
            - 'docker-compose.yml'
            - 'docker-compose.local.yml'
            - 'Game.Api/Dockerfile'
            - 'content/**'
            - 'e2e-admin-provision.sql'
            - '.dockerignore'
            - '.editorconfig'
            - 'global.json'
            - '.config/dotnet-tools.json'
            - 'Directory.Build.props'
            - 'Directory.Packages.props'
            - '.github/workflows/**'
            - 'UI/src/lib/api/types/**'
          frontend:
            - 'UI/**'
            - 'content/**'
            - '.github/workflows/**'

  # Non-test backend verifications (codegen drift + formatter), split out of test-backend so that
  # job is left with just build + tests/coverage (its longest path). Both checks need the build, so
  # this job builds independently and runs in parallel with test-backend rather than chaining off it.
  verify-backend:
    needs: [detect-changes]
    # always()/!cancelled() lets this evaluate even when detect-changes was skipped (push events).
    if: |
      always() && !cancelled() &&
      (github.event_name == 'push' || needs.detect-changes.outputs.backend == 'true')
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install .NET Core
      uses: actions/setup-dotnet@v6
      with:
        dotnet-version: 10.0.x

    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', '.config/dotnet-tools.json') }}
        restore-keys: |
          nuget-${{ runner.os }}-

    - name: Build solution
      # -warnaserror promotes analyzer/nullable warnings to errors so a warned-but-compiling
      # regression (the repo relies on nullable-reference analysis) fails CI here.
      run: dotnet build -warnaserror

    - name: Verify TypeScript codegen is up to date
      # The generated frontend API client (UI/src/lib/api/types) must stay byte-identical to what the
      # backend DTOs/controllers produce. Regenerate and assert a clean diff so a backend change that
      # forgets to regenerate fails here instead of landing stale client types. The codegen command
      # short-circuits before host construction (no Postgres/Redis/DI), so it's safe in CI; reuse the
      # binaries from "Build solution" (--no-build --no-restore), mirroring the test step below.
      # Stage everything (git add -A) then diff the index so the check spans the whole worktree (not
      # just types/) AND catches brand-new untracked files a future writer might emit; .gitignore keeps
      # bin/obj out, and the writers OrderBy their inputs so the output is stable.
      run: |
        dotnet run --project Game.Api --no-build --no-restore -- codegen
        git add -A
        git diff --cached --exit-code

    - name: Run formatter (verify only)
      # --no-restore reuses the restore/build from "Build solution" above; without it dotnet format
      # triggers its own implicit restore + MSBuild evaluation (mirrors the codegen/coverage steps).
      run: dotnet format --verify-no-changes --no-restore

  # Non-test frontend verification (ESLint + svelte-check, both via `npm run lint`), split out of
  # test-frontend so that job is left with just the unit-test + coverage run. Runs in parallel.
  verify-frontend:
    needs: [detect-changes]
    # always()/!cancelled() lets this evaluate even when detect-changes was skipped (push events).
    if: |
      always() && !cancelled() &&
      (github.event_name == 'push' || needs.detect-changes.outputs.frontend == 'true')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: UI

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version-file: UI/.nvmrc
        cache: npm
        cache-dependency-path: UI/package-lock.json

    - name: Install node modules
      run: npm ci

    - name: Run lint (ESLint + svelte-check)
      run: npm run lint

  test-backend:
    needs: [detect-changes]
    # always()/!cancelled() lets this evaluate even when detect-changes was skipped (push events).
    if: |
      always() && !cancelled() &&
      (github.event_name == 'push' || needs.detect-changes.outputs.backend == 'true')
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install .NET Core
      uses: actions/setup-dotnet@v6
      with:
        dotnet-version: 10.0.x

    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', '.config/dotnet-tools.json') }}
        restore-keys: |
          nuget-${{ runner.os }}-

    - name: Build solution
      # -warnaserror promotes analyzer/nullable warnings to errors so a warned-but-compiling
      # regression (the repo relies on nullable-reference analysis) fails CI here.
      run: dotnet build -warnaserror

    - name: Execute tests with coverage gate
      # build/coverage.ps1 restores the coverage tools, collects one merged Cobertura across the whole
      # solution's test run (dotnet-coverage, out-of-band so it's immune to the xunit.v3 / MTP version
      # coupling), builds the ReportGenerator report, and runs the per-assembly coverage gate
      # (build/coverage-floors.json). A test failure or a gate breach both fail this step. -NoBuild
      # reuses the binaries from "Build solution" above.
      shell: pwsh
      run: ./build/coverage.ps1 -NoBuild

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: backend-coverage-report
        path: coverage/backend-report
        if-no-files-found: ignore

  test-frontend:
    needs: [detect-changes]
    # always()/!cancelled() lets this evaluate even when detect-changes was skipped (push events).
    if: |
      always() && !cancelled() &&
      (github.event_name == 'push' || needs.detect-changes.outputs.frontend == 'true')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: UI

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version-file: UI/.nvmrc
        cache: npm
        cache-dependency-path: UI/package-lock.json

    - name: Install node modules
      # Reproducible install. This is safe with `npm ci` because the Node/npm version is pinned via
      # .nvmrc (see "Set up Node"); keep local dev on that same version (`nvm use`) or the lock can
      # drift — the optional WASM-runtime deps are recorded differently across npm versions.
      run: npm ci

    - name: Run unit tests
      run: npm run test:unit:ci

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: frontend-test-results
        path: 'UI/unit-test-results.json'

  test-e2e:
    needs: [detect-changes]
    # always()/!cancelled() lets this evaluate even when detect-changes was skipped (push events).
    if: |
      always() && !cancelled() &&
      (github.event_name == 'push' ||
       needs.detect-changes.outputs.backend == 'true' ||
       needs.detect-changes.outputs.frontend == 'true')
    runs-on: ubuntu-latest
    strategy:
      # Run each browser as its own parallel job. Besides cutting wall-clock to roughly a single
      # browser's runtime, this gives every browser project its own `playwright test` invocation,
      # which tears down cleanly — the serial-loop workaround this replaces existed because running
      # all three projects in one invocation intermittently left a worker hung at end-of-run teardown.
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Start backing stack (API + Postgres + Redis)
      # Build is parallelized across the matrix jobs, so it stays off the serial critical path.
      # (An earlier revision built the image via buildx with a GitHub Actions layer cache; measured
      # runs showed the cache-transfer + image-load overhead outweighed the savings on the hosted
      # runners, so the plain compose build is both simpler and faster here.)
      run: docker compose up -d --build

    - name: Apply the e2e admin-role fixture
      # The API seeds the static content (Skills, Enemies, Zones, …) itself on startup from the
      # source-controlled export (DataAccessOptions__SeedContentOnStartup in docker-compose.yml), before
      # it loads its reference-data caches — so the stack is fully playable on first boot with no post-boot
      # content seed or API restart. The only thing left to apply is the e2e-only admin-role fixture (a
      # trigger that grants the Admin role to 'e2eadmin…' accounts); it is test-harness infrastructure, not
      # content, and only affects users created afterwards, so no restart is needed.
      run: |
        # Any HTTP response (even 401) means the server is up and has finished its startup migration,
        # content seed and reference-cache load, all of which run before Kestrel begins listening.
        # `|| true` keeps `bash -e` from aborting on curl's non-zero exit while it's still starting.
        wait_for_api() {
          for i in $(seq 1 90); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:5008/api/Auth/Status) || true
            if [ "${code:-000}" != "000" ]; then
              echo "API ready (HTTP $code) after ${i} attempt(s)"
              return 0
            fi
            sleep 2
          done
          echo "API did not become ready in time"
          docker compose logs api
          return 1
        }

        wait_for_api
        # Runs inside the Postgres container so it needs no client tooling on the runner; idempotent.
        docker compose exec -T postgres psql -U game -d game -p 5544 -v ON_ERROR_STOP=1 -f - < e2e-admin-provision.sql

    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version-file: UI/.nvmrc
        cache: npm
        cache-dependency-path: UI/package-lock.json

    - name: Install node modules
      working-directory: UI
      run: npm ci

    - name: Cache Playwright browser
      id: playwright-cache
      uses: actions/cache@v5
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ matrix.browser }}-${{ hashFiles('UI/package-lock.json') }}

    - name: Install Playwright browser
      working-directory: UI
      # Only this job's browser is needed. On a cache hit the binaries are already present, so just
      # (re)install the OS-level dependencies, which actions/cache can't carry. On a miss, install both.
      run: |
        if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
          npx playwright install-deps ${{ matrix.browser }}
        else
          npx playwright install --with-deps ${{ matrix.browser }}
        fi

    - name: Run Playwright e2e tests
      working-directory: UI
      run: npx playwright test --project="${{ matrix.browser }}"

    - name: Dump container logs on failure
      if: failure()
      run: docker compose logs

    - name: Tear down backing stack
      if: always()
      run: docker compose down -v

    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: playwright-report-${{ matrix.browser }}
        path: UI/test-results
        # On an all-green run Playwright writes nothing here (traces/screenshots are only kept on
        # failure or retry), so an empty directory is expected and not a problem.
        if-no-files-found: ignore

  all-checks-passed:
    # Single required status check for branch protection. Passes when all jobs succeeded or were
    # skipped (path-filtered out); fails if any job failed or was cancelled, including
    # detect-changes itself (a change-detection failure should block the PR, not silently skip tests).
    if: always()
    needs: [detect-changes, verify-backend, verify-frontend, test-backend, test-frontend, test-e2e]
    runs-on: ubuntu-latest
    steps:
    - name: Verify all jobs passed or were skipped
      run: |
        if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
          echo "One or more required jobs failed or were cancelled"
          exit 1
        fi
        echo "All required jobs passed or were skipped"
