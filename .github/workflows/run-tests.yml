# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow will test a .NET application

name: Run tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  test-backend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Build solution
      run: dotnet build

    - name: Execute full test suite
      run: dotnet test
      
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: '**/TestResults/'

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: UI/new-svelte

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Install node modules
      run: npm install

    - name: Run ESLint
      run: npm run lint

    - name: Run unit tests
      run: npm run test:unit

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: 'UI/new-svelte/unit-test-results.json'

  test-e2e:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Start backing stack (API + Postgres + Redis)
      run: docker compose up -d --build

    - name: Wait for the API to be ready
      run: |
        for i in $(seq 1 90); do
          # Any HTTP response (even 401) means the server is up and has finished its
          # startup migration, which runs before Kestrel begins listening.
          #
          # curl's `-w '%{http_code}'` already prints 000 when it can't connect yet, so DON'T add a
          # `|| echo 000` fallback — that appends a *second* 000, yielding "000000" which trips the
          # "!= 000" check and reports the API ready on the first attempt (before it has migrated).
          # `|| true` keeps `bash -e` from aborting on curl's non-zero exit while it's still starting.
          code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:5008/api/Login/Status) || true
          if [ "${code:-000}" != "000" ]; then
            echo "API ready (HTTP $code) after ${i} attempt(s)"
            exit 0
          fi
          sleep 2
        done
        echo "API did not become ready in time"
        docker compose logs api
        exit 1

    - name: Seed static reference data
      # The API's migrations only seed the intrinsic enum-backed reference data; the static content
      # (Skills, Enemies, Zones, …) is normally authored through the admin tools and is absent from a
      # freshly-migrated database. Without at least the starter skills, the first account signup fails
      # (FK_PlayerSkills_Skills_SkillId) and the whole suite can't log in. Apply the baseline seed now
      # that migrations have run (the readiness check above guarantees that). Runs inside the Postgres
      # container so it needs no client tooling on the runner; the script is idempotent.
      run: docker compose exec -T postgres psql -U game -d game -p 5544 -v ON_ERROR_STOP=1 -f - < e2e-seed.sql

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install node modules
      working-directory: UI/new-svelte
      run: npm install

    - name: Install Playwright browsers
      working-directory: UI/new-svelte
      run: npx playwright install --with-deps

    - name: Run Playwright e2e tests
      working-directory: UI/new-svelte
      # Run each browser project as its own invocation. Running all three projects in a single
      # `playwright test` run intermittently leaves a browser worker hung at end-of-run teardown,
      # which Playwright only force-kills after a ~5-minute grace and so inflates the job; each
      # project run on its own tears down cleanly. The exit code is aggregated so every browser
      # still runs (and reports) even when an earlier one fails.
      run: |
        rc=0
        for browser in chromium firefox webkit; do
          echo "::group::Playwright ($browser)"
          npx playwright test --project="$browser" || rc=1
          echo "::endgroup::"
        done
        exit $rc

    - name: Dump container logs on failure
      if: failure()
      run: docker compose logs

    - name: Tear down backing stack
      if: always()
      run: docker compose down -v

    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: UI/new-svelte/test-results
