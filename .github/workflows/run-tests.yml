# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow will test a .NET application

name: Run tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  test-backend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install .NET Core
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          nuget-${{ runner.os }}-

    - name: Build solution
      run: dotnet build

    - name: Execute full test suite
      # The build above already restored and compiled everything; reuse those binaries instead of
      # letting `dotnet test` trigger a redundant restore + rebuild.
      run: dotnet test --no-build --no-restore

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: backend-test-results
        path: '**/TestResults/'

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: UI/new-svelte

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: UI/new-svelte/package-lock.json

    - name: Install node modules
      run: npm ci

    - name: Run ESLint
      run: npm run lint

    - name: Run unit tests
      run: npm run test:unit:ci

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: frontend-test-results
        path: 'UI/new-svelte/unit-test-results.json'

  test-e2e:
    runs-on: ubuntu-latest
    strategy:
      # Run each browser as its own parallel job. Besides cutting wall-clock to roughly a single
      # browser's runtime, this gives every browser project its own `playwright test` invocation,
      # which tears down cleanly — the serial-loop workaround this replaces existed because running
      # all three projects in one invocation intermittently left a worker hung at end-of-run teardown.
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build API image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: Game.Api/Dockerfile
        tags: gameserver-api:ci
        # Load the built image into the Docker daemon so `docker compose up` (without --build) reuses
        # it via the `image:` tag in docker-compose.yml.
        load: true
        # Persist build layers in the GitHub Actions cache so the .NET restore/base-image layers are
        # reused across runs. A single writer (chromium) updates the shared cache; the other browsers
        # read it, which avoids concurrent cache-export races between the parallel matrix jobs.
        cache-from: type=gha,scope=api
        cache-to: ${{ matrix.browser == 'chromium' && 'type=gha,scope=api,mode=max' || '' }}

    - name: Start backing stack (API + Postgres + Redis)
      run: docker compose up -d

    - name: Wait for the API to be ready
      run: |
        for i in $(seq 1 90); do
          # Any HTTP response (even 401) means the server is up and has finished its
          # startup migration, which runs before Kestrel begins listening.
          #
          # curl's `-w '%{http_code}'` already prints 000 when it can't connect yet, so DON'T add a
          # `|| echo 000` fallback — that appends a *second* 000, yielding "000000" which trips the
          # "!= 000" check and reports the API ready on the first attempt (before it has migrated).
          # `|| true` keeps `bash -e` from aborting on curl's non-zero exit while it's still starting.
          code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:5008/api/Login/Status) || true
          if [ "${code:-000}" != "000" ]; then
            echo "API ready (HTTP $code) after ${i} attempt(s)"
            exit 0
          fi
          sleep 2
        done
        echo "API did not become ready in time"
        docker compose logs api
        exit 1

    - name: Seed static reference data
      # The API's migrations only seed the intrinsic enum-backed reference data; the static content
      # (Skills, Enemies, Zones, …) is normally authored through the admin tools and is absent from a
      # freshly-migrated database. Without at least the starter skills, the first account signup fails
      # (FK_PlayerSkills_Skills_SkillId) and the whole suite can't log in. Apply the baseline seed now
      # that migrations have run (the readiness check above guarantees that). Runs inside the Postgres
      # container so it needs no client tooling on the runner; the script is idempotent.
      run: docker compose exec -T postgres psql -U game -d game -p 5544 -v ON_ERROR_STOP=1 -f - < e2e-seed.sql

    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: UI/new-svelte/package-lock.json

    - name: Install node modules
      working-directory: UI/new-svelte
      run: npm ci

    - name: Cache Playwright browser
      id: playwright-cache
      uses: actions/cache@v5
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ matrix.browser }}-${{ hashFiles('UI/new-svelte/package-lock.json') }}

    - name: Install Playwright browser
      working-directory: UI/new-svelte
      # Only this job's browser is needed. On a cache hit the binaries are already present, so just
      # (re)install the OS-level dependencies, which actions/cache can't carry. On a miss, install both.
      run: |
        if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
          npx playwright install-deps ${{ matrix.browser }}
        else
          npx playwright install --with-deps ${{ matrix.browser }}
        fi

    - name: Run Playwright e2e tests
      working-directory: UI/new-svelte
      run: npx playwright test --project="${{ matrix.browser }}"

    - name: Dump container logs on failure
      if: failure()
      run: docker compose logs

    - name: Tear down backing stack
      if: always()
      run: docker compose down -v

    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: playwright-report-${{ matrix.browser }}
        path: UI/new-svelte/test-results
        # On an all-green run Playwright writes nothing here (traces/screenshots are only kept on
        # failure or retry), so an empty directory is expected and not a problem.
        if-no-files-found: ignore
